# Build Next.js (`web/`) and publish `out/` to GitHub Pages.
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Set repo secret NEXT_PUBLIC_CHAT_API_URL to your Worker URL, e.g.
      # https://chatbot-backend.<account-subdomain>.workers.dev
      # (Settings → Secrets and variables → Actions — value must not include quotes)
      - name: Verify chat backend URL for production build
        env:
          NEXT_PUBLIC_CHAT_API_URL: ${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_CHAT_API_URL" ]; then
            echo "::warning::NEXT_PUBLIC_CHAT_API_URL is empty — production chat will be disabled until this Actions secret is set."
          else
            echo "NEXT_PUBLIC_CHAT_API_URL is set for build (length ${#NEXT_PUBLIC_CHAT_API_URL})."
          fi

      - name: Install and build
        working-directory: web
        env:
          NEXT_PUBLIC_CHAT_API_URL: ${{ secrets.NEXT_PUBLIC_CHAT_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
